<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corvo Coder</title>
    <meta name="description" content="Plataforma de desenvolvimento full-stack assistido por inteligência artificial">
    <meta name="theme-color" content="#12121f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Corvo Coder">
    <link rel="manifest" href="/public/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
    <link rel="apple-touch-icon" href="/public/icons/icon-192.svg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/public/service-worker.js')
                    .then(reg => console.log('📱 PWA: Service Worker registrado', reg.scope))
                    .catch(err => console.log('📱 PWA: Service Worker falhou', err));
            });
        }
    </script>
</head>
<body>
    <div class="app">
        <nav class="nav">
            <div class="nav-left">
                <button class="menu-btn" onclick="toggleSidebar()" title="Menu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="logo">
                    <img src="logo.jpg" alt="Corvo Coder" class="logo-img">
                    <span class="logo-text">Corvo Coder</span>
                </div>
            </div>
            <div class="nav-center">
            </div>
            <div class="nav-right">
                <div class="nav-actions" id="navActions" style="display:none">
                    <button class="nav-action-btn" onclick="openWorkspace()" title="Abrir VS Code View">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                        VS Code View
                    </button>
                    <button class="nav-action-btn deploy" onclick="deployProject()" title="Fazer Deploy">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        Deploy
                    </button>
                </div>
                <div class="credits-pill">
                    <div class="credits-bar"><div class="credits-fill" id="creditsFill"></div></div>
                    <span id="creditsText">100 créditos</span>
                </div>
                <div class="avatar-btn" onclick="toggleUserMenu()">
                    <span id="userInitial">U</span>
                </div>
                <div class="user-dropdown" id="userDropdown">
                    <div class="dropdown-header">
                        <div class="dropdown-name" id="dropdownName">Usuário</div>
                        <div class="dropdown-email" id="dropdownEmail">email@email.com</div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a href="pages/settings.html" class="dropdown-item">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        Configurações
                    </a>
                    <a href="pages/billing.html" class="dropdown-item">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                        Planos
                    </a>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" onclick="logout()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        Sair
                    </button>
                </div>
            </div>
        </nav>

        <div class="layout">
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
        <aside class="sidebar collapsed" id="sidebar">
                <div class="sidebar-section">
                    <button class="new-chat-btn" onclick="newChat()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Nova Conversa
                    </button>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-label">Recentes</div>
                    <div id="chatList"></div>
                </div>
                <div class="sidebar-bottom">
                    <div class="sidebar-credits">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                        <span id="sideCredits">100 créditos restantes</span>
                    </div>
                </div>
            </aside>

            <main class="main" id="mainArea">
                <div class="chat-container" id="chatContainer">
                    <div class="welcome" id="welcomeScreen">
                        <img src="logo.jpg" alt="Corvo Coder" class="welcome-logo">
                        <h1 class="welcome-title">O que você quer <span class="gradient">criar</span> hoje?</h1>
                        <p class="welcome-sub">Descreva sua ideia e eu vou construir pra você</p>
                    </div>
                    <div class="messages" id="messages"></div>
                </div>

                <div class="input-area" id="inputArea">
                    <div class="image-preview-bar" id="imagePreviewBar" style="display:none"></div>
                    <div class="input-wrapper">
                        <input type="file" id="fileInput" style="display:none" multiple accept="image/*,audio/*,.txt,.js,.css,.html,.json,.py,.md" onchange="handleFiles(this.files)">
                        <button class="attach-btn" title="Anexar arquivo" onclick="document.getElementById('fileInput').click()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        </button>
                        <textarea id="chatInput" placeholder="Descreva o que você quer criar..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                        <button class="mic-btn" id="micBtn" title="Gravar áudio" onclick="toggleMic()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>
                        <button class="send-btn" id="sendBtn" onclick="send()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                    <p class="input-hint">Enter para enviar • Shift+Enter para nova linha • Colar imagens (Ctrl+V) • Arrastar arquivos</p>
                </div>
            </main>
        </div>
    </div>

    <a href="#" class="wa-float" id="waFloat" target="_blank" rel="noopener" title="Fale conosco no WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>

    <script src="js/app.js"></script>
    <script>
        fetch('/api/config').then(r => r.json()).then(d => {
            if (d.whatsapp) {
                document.getElementById('waFloat').href = 'https://wa.me/' + d.whatsapp.replace(/[^0-9]/g, '');
            } else {
                document.getElementById('waFloat').style.display = 'none';
            }
        }).catch(() => {});
    </script>
</body>
</html>
