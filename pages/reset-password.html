<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha — Corvo Coder</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="../logo.jpg" alt="Corvo Coder">
                <h1 class="auth-title">Redefinir senha</h1>
                <p class="auth-sub">Digite sua nova senha</p>
            </div>
            <div id="authError" class="auth-error" style="display:none"></div>
            <div id="authSuccess" style="display:none;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#22c55e;padding:12px 16px;border-radius:10px;font-size:0.82rem;margin-bottom:14px"></div>
            <form id="resetForm" onsubmit="resetPassword(event)">
                <div class="form-group">
                    <label class="form-label">Nova Senha</label>
                    <input type="password" class="form-input" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmar Senha</label>
                    <input type="password" class="form-input" id="confirm" placeholder="Repita a senha" required minlength="6">
                </div>
                <button type="submit" class="auth-btn" id="resetBtn">Redefinir Senha</button>
            </form>
            <div class="auth-footer">
                <a href="login.html">Voltar ao login</a>
            </div>
        </div>
    </div>
    <script>
        const API = window.location.origin;
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        if (!token) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('authError').textContent = 'Token inválido ou expirado. Solicite um novo link.';
            document.getElementById('authError').style.display = 'block';
        }
        async function resetPassword(e) {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            if (pwd !== confirm) {
                document.getElementById('authError').textContent = 'Senhas não conferem.';
                document.getElementById('authError').style.display = 'block';
                return;
            }
            const btn = document.getElementById('resetBtn');
            btn.textContent = 'Redefinindo...';
            btn.disabled = true;
            try {
                const res = await fetch(API + '/api/auth/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token, password: pwd })
                });
                const data = await res.json();
                if (data.error) {
                    document.getElementById('authError').textContent = data.error;
                    document.getElementById('authError').style.display = 'block';
                } else {
                    document.getElementById('resetForm').style.display = 'none';
                    const success = document.getElementById('authSuccess');
                    success.style.display = 'block';
                    success.innerHTML = 'Senha redefinida! <a href="login.html" style="color:#22c55e">Fazer login</a>';
                }
            } catch {
                document.getElementById('authError').textContent = 'Erro de conexão.';
                document.getElementById('authError').style.display = 'block';
            }
            btn.textContent = 'Redefinir Senha';
            btn.disabled = false;
        }
    </script>
</body>
</html>
