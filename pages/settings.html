<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Corvo Coder</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page" style="align-items:flex-start;padding-top:60px">
        <div style="width:100%;max-width:600px">
            <a href="../index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                Voltar
            </a>

            <h1 class="settings-title">Configurações</h1>
            <p class="settings-sub">Gerencie sua conta e preferências</p>

            <div class="settings-card">
                <h3>Perfil</h3>
                <div class="settings-row">
                    <div class="form-group">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-input" id="setName">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="setEmail">
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn-primary" onclick="saveProfile()">Salvar</button>
                </div>
            </div>

            <div class="settings-card">
                <h3>Plano Atual</h3>
                <div style="display:flex;align-items:center;justify-content:space-between">
                    <div>
                        <div style="font-size:0.9rem;font-weight:600">Free</div>
                        <div style="font-size:0.8rem;color:var(--text-muted)">100 créditos/dia</div>
                    </div>
                    <a href="billing.html" class="btn-primary" style="text-decoration:none">Upgrade</a>
                </div>
            </div>

            <div class="settings-card" style="border-color:rgba(239,68,68,0.2)">
                <h3 style="color:var(--red)">Zona de Perigo</h3>
                <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:16px">Apagar sua conta é permanente. Todos os dados serão perdidos.</p>
                <button class="btn-danger" onclick="deleteAccount()">Apagar Conta</button>
            </div>
        </div>
    </div>
    <script>
        const API = window.location.origin;
        const user = JSON.parse(localStorage.getItem('cc_user') || '{}');
        document.getElementById('setName').value = user.name || '';
        document.getElementById('setEmail').value = user.email || '';

        async function apiFetch(path, opts = {}) {
            const token = localStorage.getItem('cc_token');
            const res = await fetch(API + path, {
                ...opts,
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...opts.headers }
            });
            return await res.json();
        }

        async function saveProfile() {
            const name = document.getElementById('setName').value.trim();
            const email = document.getElementById('setEmail').value.trim();
            if (!name || !email) { alert('Preencha todos os campos'); return; }
            try {
                await apiFetch('/api/user/profile', { method: 'PUT', body: JSON.stringify({ name, email }) });
                user.name = name;
                user.email = email;
                localStorage.setItem('cc_user', JSON.stringify(user));
                alert('Perfil salvo!');
            } catch (e) {
                alert('Erro ao salvar: ' + e.message);
            }
        }

        async function deleteAccount() {
            if (!confirm('Tem certeza? Esta ação não pode ser desfeita.')) return;
            try {
                await apiFetch('/api/user/account', { method: 'DELETE' });
                localStorage.clear();
                window.location.href = 'login.html';
            } catch (e) {
                alert('Erro ao apagar conta: ' + e.message);
            }
        }
    </script>
    <a href="#" class="wa-float" id="waFloat" target="_blank" rel="noopener" title="Fale conosco no WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>
    <script>
        fetch('/api/config').then(r=>r.json()).then(d=>{
            if(d.whatsapp){document.getElementById('waFloat').href='https://wa.me/'+d.whatsapp.replace(/[^0-9]/g,'')}
            else{document.getElementById('waFloat').style.display='none'}
        }).catch(()=>{});
    </script>
</body>
</html>
