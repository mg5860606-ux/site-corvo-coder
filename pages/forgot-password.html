<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha — Corvo Coder</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="../logo.jpg" alt="Corvo Coder">
                <h1 class="auth-title">Recuperar senha</h1>
                <p class="auth-sub">Receba um link para redefinir sua senha</p>
            </div>
            <div id="authError" class="auth-error" style="display:none"></div>
            <div id="authSuccess" style="display:none;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#22c55e;padding:12px 16px;border-radius:10px;font-size:0.82rem;margin-bottom:14px"></div>
            <form id="forgotForm" onsubmit="sendReset(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="seu@email.com" required>
                </div>
                <button type="submit" class="auth-btn" id="sendBtn">Enviar Link</button>
            </form>
            <div class="auth-footer">
                Lembrou a senha? <a href="login.html">Entrar</a>
            </div>
        </div>
    </div>
    <script>
        const API = window.location.origin;
        async function sendReset(e) {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            btn.textContent = 'Enviando...';
            btn.disabled = true;
            try {
                const res = await fetch(API + '/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: document.getElementById('email').value })
                });
                const data = await res.json();
                if (data.error) {
                    document.getElementById('authError').textContent = data.error;
                    document.getElementById('authError').style.display = 'block';
                } else {
                    document.getElementById('forgotForm').style.display = 'none';
                    const success = document.getElementById('authSuccess');
                    success.style.display = 'block';
                    success.textContent = data.message || 'Se o email existir, você receberá um link de recuperação.';
                }
            } catch {
                document.getElementById('authError').textContent = 'Erro de conexão.';
                document.getElementById('authError').style.display = 'block';
            }
            btn.textContent = 'Enviar Link';
            btn.disabled = false;
        }
    </script>
</body>
</html>
