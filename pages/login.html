<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Corvo Coder</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="../logo.jpg" alt="Corvo Coder">
                <h1 class="auth-title">Bem-vindo de volta</h1>
                <p class="auth-sub">Entre na sua conta para continuar</p>
            </div>

            <div id="authError" class="auth-error" style="display:none"></div>

            <div class="auth-social">
                <div id="googleBtnWrap">
                    <button class="social-btn" id="googleBtn" onclick="googleLogin()">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Continuar com Google
                    </button>
                </div>
                <button class="social-btn github-btn" onclick="githubLogin()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    Continuar com GitHub
                </button>
            </div>

            <div class="auth-divider">ou</div>

            <form onsubmit="login(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>                                <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="6">
                            </div>
                            <div style="text-align:right;margin-top:-8px;margin-bottom:14px">
                                <a href="forgot-password.html" style="color:var(--muted);font-size:0.75rem;text-decoration:none">Esqueci a senha</a>
                            </div>
                            <button type="submit" class="auth-btn" id="loginBtn">Entrar</button>
            </form>

            <div class="auth-footer">
                Não tem conta? <a href="signup.html">Criar conta</a>
            </div>
        </div>
    </div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const API = window.location.origin;
        let googleClientId = '';

        // Handle GitHub OAuth redirect
        (function() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('token')) {
                localStorage.setItem('cc_token', params.get('token'));
                try {
                    const user = JSON.parse(decodeURIComponent(params.get('user')));
                    localStorage.setItem('cc_user', JSON.stringify(user));
                    localStorage.setItem('cc_credits', user.credits.toString());
                } catch {}
                window.location.href = '../index.html';
                return;
            }
            if (params.get('error')) {
                showError('Erro ao entrar com GitHub. Tente novamente.');
            }
        })();

        // Redirect if already logged in
        if (localStorage.getItem('cc_token')) {
            fetch(API + '/api/auth/me', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('cc_token') } })
                .then(r => { if (r.ok) window.location.href = '../index.html'; })
                .catch(() => {});
        }

        function showError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        // === GOOGLE ===
        async function initGoogle() {
            try {
                const res = await fetch(API + '/api/auth/google-client-id');
                const data = await res.json();
                googleClientId = data.clientId;
                if (!googleClientId) {
                    document.getElementById('googleBtn').disabled = true;
                    document.getElementById('googleBtn').title = 'Google OAuth não configurado';
                    return;
                }
                google.accounts.id.initialize({
                    client_id: googleClientId,
                    callback: handleGoogleCredential
                });
            } catch {}
        }

        function googleLogin() {
            if (!googleClientId) {
                showError('Google OAuth não configurado. Adicione GOOGLE_CLIENT_ID no .env');
                return;
            }
            google.accounts.id.prompt((notification) => {
                if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                    showError('Não foi possível mostrar o seletor de contas. Verifique se tem múltiplas contas Google logadas no navegador.');
                }
            });
        }

        async function handleGoogleCredential(response) {
            try {
                const res = await fetch(API + '/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });
                const data = await res.json();
                if (data.error) { showError(data.error); return; }
                localStorage.setItem('cc_token', data.token);
                localStorage.setItem('cc_user', JSON.stringify(data.user));
                localStorage.setItem('cc_credits', data.user.credits.toString());
                window.location.href = '../index.html';
            } catch (err) {
                showError('Erro ao conectar com o servidor.');
            }
        }

        // === GITHUB ===
        function githubLogin() {
            window.location.href = API + '/api/auth/github';
        }

        // === EMAIL/SENHA ===
        async function login(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Entrando...';
            btn.disabled = true;
            try {
                const res = await fetch(API + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.error) { showError(data.error); btn.textContent = 'Entrar'; btn.disabled = false; return; }
                localStorage.setItem('cc_token', data.token);
                localStorage.setItem('cc_user', JSON.stringify(data.user));
                localStorage.setItem('cc_credits', data.user.credits.toString());
                window.location.href = '../index.html';
            } catch (err) {
                showError('Erro de conexão. Verifique se o servidor está rodando.');
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        }

        initGoogle();
    </script>

</body>
</html>
